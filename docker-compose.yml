services:
  mysql:
    image: mysql:8.0
    container_name: reservation-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: pwd1234
      MYSQL_DATABASE: reservation
      TZ: Asia/Seoul
    volumes:
      - mysql-data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-ppwd1234"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: reservation-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build: .
    container_name: reservation-app
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/reservation?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul
      SPRING_DATA_REDIS_HOST: redis
    restart: on-failure

  k6:
    image: grafana/k6:latest
    container_name: reservation-k6
    ports:
      - "5665:5665"
    depends_on:
      app:
        condition: service_started
    volumes:
      - ./k6:/scripts
    environment:
      BASE_URL: http://app:8080
      BASE_USER_ID: "3"
      ROOM_TYPE_ID: "1"
      PROMOTION_ROOM_TYPE_ID: "1"
      K6_WEB_DASHBOARD: "true"
      K6_WEB_DASHBOARD_EXPORT: /scripts/report.html
    command: run /scripts/booking-concurrency.js
    profiles:
      - k6

volumes:
  mysql-data:
  redis-data:
